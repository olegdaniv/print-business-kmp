services:
  - type: web
    name: print-business-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: print-business-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: print-business-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: print-business-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: print-business-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: print-business-db
          property: password
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: print-business-api
      - key: JWT_AUDIENCE
        value: print-business-client
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://print-business-kmp.onrender.com

databases:
  - name: print-business-db
    databaseName: printbusiness_db
    user: printbusiness
    plan: free
