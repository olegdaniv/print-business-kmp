name: print-business-kmp

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-printbusiness_db}
      POSTGRES_USER: ${POSTGRES_USER:-printbusiness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - app

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    image: print-business-backend:local
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-printbusiness_db}
      DB_USER: ${POSTGRES_USER:-printbusiness}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped
    networks:
      - app
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: ${WATCHTOWER_SCOPE:-print-business-kmp}

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    image: print-business-web:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - app
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: ${WATCHTOWER_SCOPE:-print-business-kmp}

  watchtower:
    image: containrrr/watchtower:1.7.1
    command:
      - --label-enable
      - --scope
      - ${WATCHTOWER_SCOPE:-print-business-kmp}
      - --cleanup
      - --interval
      - ${WATCHTOWER_POLL_SECONDS:-300}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    profiles:
      - watchtower
    networks:
      - app

volumes:
  postgres_data:

networks:
  app:
